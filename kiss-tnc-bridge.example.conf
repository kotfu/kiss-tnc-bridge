# kiss-tnc-bridge configuration file
#
# Each non-global section defines a KISS TNC TCP server to bridge.
# The section name is used as the BLE advertised name.

[global]
# Log level: trace, debug, info, warn, error
log_level = info

# BlueZ adapter name (omit to use the default adapter)
# adapter = hci0

# Each section below defines a TNC to bridge via BLE.
# Required keys: host, port
# Optional keys: max_clients (default: 3)

[APRS iGate]
host = 127.0.0.1
port = 8001
max_clients = 3

# [Winlink TNC]
# host = 192.168.1.50
# port = 8001
# max_clients = 2
