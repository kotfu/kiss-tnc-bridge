[target.aarch64-unknown-linux-gnu]
pre-build = ["dpkg --add-architecture arm64 && apt-get update && apt-get install -y libdbus-1-dev:arm64"]

[target.arm-unknown-linux-gnueabihf]
pre-build = [
    "apt-get update && apt-get install -y wget pkg-config make xz-utils",
    "cd /tmp && wget -q https://github.com/libexpat/libexpat/releases/download/R_2_6_4/expat-2.6.4.tar.xz && tar xf expat-2.6.4.tar.xz && cd expat-2.6.4 && ./configure --host=arm-linux-gnueabihf --prefix=/usr --libdir=/usr/lib/arm-linux-gnueabihf CC=arm-linux-gnueabihf-gcc CFLAGS='-march=armv6 -mfpu=vfp -mfloat-abi=hard' --quiet && make -j$(nproc) --quiet && make install --quiet && rm -rf /tmp/expat*",
    "cd /tmp && wget -q https://dbus.freedesktop.org/releases/dbus/dbus-1.14.10.tar.xz && tar xf dbus-1.14.10.tar.xz && cd dbus-1.14.10 && PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig ./configure --host=arm-linux-gnueabihf --prefix=/usr --libdir=/usr/lib/arm-linux-gnueabihf CC=arm-linux-gnueabihf-gcc CFLAGS='-march=armv6 -mfpu=vfp -mfloat-abi=hard' --disable-tests --disable-xml-docs --disable-doxygen-docs --disable-systemd --disable-selinux --disable-launchd --quiet && make -j$(nproc) --quiet && make install --quiet && rm -rf /tmp/dbus*",
]
