name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    name: Verify tag matches Cargo.toml
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match Cargo.toml version (${CARGO_VERSION})"
            exit 1
          fi
          echo "Version match: ${TAG_VERSION}"

  build:
    name: Build ${{ matrix.target }}
    needs: check-version
    if: always() && !failure()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            use_cross: false
            build_rpm: true
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            use_cross: true
            build_rpm: true
          - target: arm-unknown-linux-gnueabihf
            arch: armhf
            use_cross: true
            build_rpm: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install system dependencies
        if: "!matrix.use_cross"
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Install cargo-generate-rpm
        if: matrix.build_rpm
        run: cargo install cargo-generate-rpm

      - name: Build rpm package
        if: matrix.build_rpm
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE_NAME="kiss-tnc-bridge-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/kiss-tnc-bridge" "${ARCHIVE_NAME}/"
          cp kiss-tnc-bridge.example.conf "${ARCHIVE_NAME}/"
          cp kiss-tnc-bridge.service "${ARCHIVE_NAME}/"
          cp LICENSE "${ARCHIVE_NAME}/"
          cp README.md "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.arch }}
          path: |
            kiss-tnc-bridge-*-linux-${{ matrix.arch }}.tar.gz
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            **/*.deb
            **/*.rpm
